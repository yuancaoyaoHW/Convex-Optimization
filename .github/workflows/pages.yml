name: Deploy translation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "translation/**"
      - "bv_cvxbook.pdf"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          find translation -maxdepth 1 -type f -name "*.html" -exec cp {} _site/ \;
          cp -R translation/assets _site/assets
          cp translation/.nojekyll _site/.nojekyll
          cp bv_cvxbook.pdf _site/bv_cvxbook.pdf

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
